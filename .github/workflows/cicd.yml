name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t hello-world:${{ github.sha }} .

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Image
        run: |
          docker tag hello-world:${{ github.sha }} \
          ${{ secrets.DOCKER_USERNAME }}/hello-world:${{ github.sha }}

      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/hello-world:${{ github.sha }}
